<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expert Management - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --dark-bg: #121212; --card-bg: #1e1e1e; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }

        .admin-container { max-width: 1200px; margin: auto; }
        .stats-bar { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 12px; flex: 1; border-left: 4px solid var(--gold); }

        /* Table Styling */
        .table-wrapper { background: var(--card-bg); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #262626; color: var(--gold); padding: 15px; text-transform: uppercase; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #333; vertical-align: middle; }
        tr:hover { background: #252525; }

        /* Profile Photo Circle */
        .expert-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        
        /* Status Badges */
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .pending { background: #f39c12; color: #000; }
        .approved { background: #27ae60; color: #fff; }

        /* Action Buttons */
        .btn-view { background: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 12px; }
        .btn-approve { background: var(--gold); color: black; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        
        .loading { text-align: center; padding: 40px; color: var(--gold); font-size: 20px; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header">
        <h2 style="color: var(--gold);"><i class="fas fa-users-cog"></i> Expert Recruitment Management</h2>
        <p style="color: #888;">নতুন এক্সপার্টদের প্রোফাইল রিভিউ এবং এপ্রুভ করুন</p>
    </div>

    <div class="table-wrapper">
        <table id="expertTable">
            <thead>
                <tr>
                    <th>Photo</th>
                    <th>Name & Info</th>
                    <th>Category</th>
                    <th>Bio-Data</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="expertList">
                </tbody>
        </table>
        <div id="loader" class="loading"><i class="fas fa-spinner fa-spin"></i> Loading Experts...</div>
    </div>
</div>

<script>
    // --- Firestore থেকে ডাটা রিড করা ---
    const expertList = document.getElementById('expertList');
    const loader = document.getElementById('loader');

    async function loadExperts() {
        try {
            // Firestore 'experts' কালেকশন থেকে ডাটা আনা (লেটেস্ট আগে)
            const snapshot = await db.collection("experts").orderBy("timestamp", "desc").get();
            
            loader.style.display = 'none';
            expertList.innerHTML = "";

            snapshot.forEach(doc => {
                const data = doc.data();
                const id = doc.id;

                const row = `
                    <tr>
                        <td>
                            <img src="${data.selfie || 'https://via.placeholder.com/50'}" class="expert-img" onerror="this.src='https://via.placeholder.com/50'">
                        </td>
                        <td>
                            <div style="font-weight: bold;">${data.name}</div>
                            <div style="font-size: 12px; color: #aaa;"><i class="fas fa-phone"></i> ${data.mobile}</div>
                        </td>
                        <td>
                            <span style="color: var(--gold); font-size: 13px;">${data.job}</span><br>
                            <small style="color: #666;">Exp: ${data.experience} Yrs</small>
                        </td>
                        <td>
                            ${data.resume ? 
                                `<a href="${data.resume}" target="_blank" class="btn-view"><i class="fas fa-file-pdf"></i> View Bio</a>` : 
                                `<span style="color: #555;">No File</span>`}
                        </td>
                        <td>
                            <span class="status-badge ${data.status === 'Approved' ? 'approved' : 'pending'}">
                                ${data.status}
                            </span>
                        </td>
                        <td>
                            <button onclick="approveExpert('${id}')" class="btn-approve">Approve</button>
                            <button onclick="deleteExpert('${id}')" style="background:#e74c3c; color:white; border:none; padding:8px; border-radius:5px; margin-left:5px;"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
                expertList.innerHTML += row;
            });
        } catch (error) {
            console.error("Error loading experts: ", error);
            loader.innerHTML = "Error loading data. Check Console.";
        }
    }

    // --- এপ্রুভ করার ফাংশন ---
    async function approveExpert(id) {
        if(confirm("এই এক্সপার্টকে কি এপ্রুভ করতে চান?")) {
            await db.collection("experts").doc(id).update({
                status: "Approved"
            });
            alert("Expert Approved!");
            loadExperts(); // টেবিল রিফ্রেশ
        }
    }

    // --- ডিলিট করার ফাংশন ---
    async function deleteExpert(id) {
        if(confirm("আপনি কি নিশ্চিত যে এই প্রোফাইলটি ডিলিট করবেন?")) {
            await db.collection("experts").doc(id).delete();
            loadExperts();
        }
    }

    // পেজ লোড হলে ডাটা দেখাবে
    window.onload = loadExperts;
</script>

</body>
</html>
