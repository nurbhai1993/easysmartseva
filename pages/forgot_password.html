<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid #FFD700; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #334155; background: #000; color: #fff; box-sizing: border-box;}
        button { background: #FFD700; color: #000; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3 style="color: #FFD700;">পাসওয়ার্ড ভুলে গেছেন?</h3>
        <p style="font-size: 13px; color: #ccc;">আপনার রেজিস্টার্ড মোবাইল নম্বরটি দিন। অ্যাডমিন আপনার সাথে যোগাযোগ করে পাসওয়ার্ড রিসেট করে দেবে।</p>
        <input type="text" id="phoneInput" placeholder="মোবাইল নম্বর (যেমন: 9876543210)">
        <button id="reqBtn">রিকোয়েস্ট পাঠান</button>
        <p id="status" style="font-size: 12px; margin-top: 10px;"></p>
    </div>

    <script type="module">
        import { db } from '../js/firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.getElementById('reqBtn').onclick = async () => {
            const phone = document.getElementById('phoneInput').value;
            if(phone.length < 10) return alert("সঠিক মোবাইল নম্বর দিন");

            await addDoc(collection(db, "reset_requests"), {
                mobile: phone,
                status: "Pending",
                requestTime: new Date().toLocaleString('bn-IN'),
                timestamp: serverTimestamp()
            });

            document.getElementById('status').innerText = "অনুরোধ পাঠানো হয়েছে! অ্যাডমিন এটি চেক করবেন।";
            document.getElementById('phoneInput').value = "";
        };
    </script>
</body>
</html>
