<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Login | SmartSeva Connect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="login-container">
        <div class="glass-card">
            <div class="logo-circle">
                <img src="../assets/images/logo.png" alt="S" onerror="this.src='https://via.placeholder.com/50'">
            </div>
            <h2>Welcome to SmartSeva</h2>
            <p>Associate Portal লগইন করুন</p>

            <form id="loginForm">
                <div class="input-box">
                    <i class="fas fa-user-circle"></i>
                    <input type="text" id="userId" placeholder="Associate ID" required>
                </div>
                <div class="input-box">
                    <i class="fas fa-shield-alt"></i>
                    <input type="password" id="userPass" placeholder="Security Password" required>
                    <i class="fas fa-eye toggle-pass" id="eyeIcon" style="left: auto; right: 15px; cursor: pointer; color: #888;"></i>
                </div>
                <button type="submit" class="login-btn">LOGIN NOW</button>
                <div id="errorBox" class="error-msg"></div>
            </form>

            <div class="footer-links">
                <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
            </div>
        </div>
    </div>

    <script type="module" src="../js/login.js"></script>
</body>
</html>
